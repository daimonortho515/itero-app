<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="iTero管理">
<title>iTero管理</title>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--s2:#f0ede8;--border:#e0dbd3;--b2:#ccc7be;--text:#1a1917;--t2:#6b6660;--t3:#9b948e;--accent:#2563c8;--abg:#eef3fc;--green:#16a34a;--gbg:#f0fdf4;--gt:#15803d;--amber:#d97706;--ambg:#fffbeb;--amt:#b45309;--red:#dc2626;--rbg:#fef2f2;--rt:#b91c1c;--org:#ea580c;--obg:#fff7ed;--ot:#c2410c;--pur:#7c3aed;--pbg:#f5f3ff;--pt:#6d28d9;--r:10px;--rs:6px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;color:var(--text);font-size:14px;overflow:hidden;}
#root{height:100%;height:100dvh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;flex-shrink:0;}
.topbar h1{font-size:15px;font-weight:700;}
.sync-btn{margin-left:auto;font-size:12px;padding:5px 12px;border-radius:var(--rs);border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;}
.main-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.main-tabs button{flex:1;min-width:55px;padding:10px 3px;font-size:11px;border:none;background:transparent;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.main-tabs button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.main-tabs button.ta{color:var(--rt);}
.main-tabs button.ta.on{color:var(--rt);border-bottom-color:var(--red);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.ct{font-size:13px;font-weight:700;margin-bottom:12px;}
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.f label{font-size:11px;color:var(--t2);font-weight:500;}
.f input,.f select{font-size:14px;border-radius:var(--rs);border:1px solid var(--b2);padding:9px 10px;background:var(--s2);color:var(--text);outline:none;-webkit-appearance:none;width:100%;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rs);min-height:42px;}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--b2);background:var(--surface);color:var(--t2);}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.chkrow{display:flex;flex-wrap:wrap;gap:8px;}
.ci{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;cursor:pointer;}
.ci input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
.ci.iso{background:var(--obg);border-color:#fed7aa;color:var(--ot);}
.btn{padding:10px 20px;border-radius:var(--rs);font-size:14px;cursor:pointer;font-weight:500;border:1px solid var(--b2);background:var(--surface);color:var(--text);}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-d{background:var(--rbg);color:var(--rt);border-color:#fca5a5;font-size:12px;padding:5px 10px;}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;padding-bottom:20px;}
.al{padding:10px 13px;border-radius:var(--rs);font-size:13px;margin-bottom:10px;}
.al-ok{background:var(--gbg);color:var(--gt);border:1px solid #bbf7d0;}
.al-err{background:var(--rbg);color:var(--rt);border:1px solid #fca5a5;}
.stabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;}
.stab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--b2);background:var(--surface);color:var(--t2);white-space:nowrap;font-weight:500;}
.stab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.fbtns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.fb{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--b2);background:var(--surface);color:var(--t2);cursor:pointer;white-space:nowrap;}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.rc.icard{border-left:4px solid var(--org);}
.rn{font-size:15px;font-weight:700;}
.rm{font-size:12px;color:var(--t2);margin-top:3px;}
.rchks{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.rchk{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);font-size:12px;cursor:pointer;}
.rchk input{width:15px;height:15px;accent-color:var(--green);}
.rchk.done{background:var(--gbg);border-color:#bbf7d0;color:var(--gt);}
.prog{height:4px;background:var(--border);border-radius:2px;margin-top:8px;}
.progf{height:100%;border-radius:2px;background:var(--green);}
.bdg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.b-ok{background:var(--gbg);color:var(--gt);}
.b-warn{background:var(--ambg);color:var(--amt);}
.b-gray{background:var(--s2);color:var(--t3);}
.b-red{background:var(--rbg);color:var(--rt);}
.b-org{background:var(--obg);color:var(--ot);}
.b-pur{background:var(--pbg);color:var(--pt);}
.tb{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;margin-top:6px;}
.tbn{font-size:12px;font-weight:700;margin-bottom:6px;}
.hbtns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-top:6px;}
.hbtn{padding:5px 4px;font-size:11px;border-radius:var(--rs);border:1.5px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;text-align:center;}
.hbtn.mizen.on{background:var(--rbg);color:var(--rt);border-color:#fca5a5;font-weight:700;}
.hbtn.chuu.on{background:var(--ambg);color:var(--amt);border-color:#fde68a;font-weight:700;}
.hbtn.ok.on{background:var(--gbg);color:var(--gt);border-color:#bbf7d0;font-weight:700;}
.hbtn.extra.on{background:var(--pbg);color:var(--pt);border-color:#c4b5fd;font-weight:700;}
.abtns{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;}
.abtn{padding:6px 4px;font-size:11px;border-radius:var(--rs);border:1.5px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;text-align:center;}
.ibtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:8px;}
.ibtn{padding:6px 4px;font-size:12px;border-radius:var(--rs);border:1.5px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;text-align:center;}
.view-toggle{display:flex;gap:6px;margin-bottom:10px;}
.vbtn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--b2);background:var(--surface);color:var(--t2);cursor:pointer;}
.vbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.kanban{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;align-items:flex-start;}
.kancol{flex:0 0 calc(25% - 6px);min-width:95px;background:var(--s2);border-radius:var(--r);padding:8px;}
.kancol2{flex:0 0 calc(50% - 4px);min-width:120px;}
.kancol4{flex:0 0 calc(25% - 6px);min-width:90px;}
.kan-hd{font-size:11px;font-weight:700;padding:4px 8px;border-radius:var(--rs);margin-bottom:8px;text-align:center;}
.kan-hd.mizen{background:var(--rbg);color:var(--rt);}
.kan-hd.chuu{background:var(--ambg);color:var(--amt);}
.kan-hd.ok{background:var(--gbg);color:var(--gt);}
.kan-hd.extra{background:var(--pbg);color:var(--pt);}
.kancard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:7px 8px;margin-bottom:6px;cursor:grab;}
.kancard:active{cursor:grabbing;opacity:0.7;transform:scale(0.98);}
.kancard.dragging{opacity:0.4;}
.kancol.drag-over{background:var(--abg);border:2px dashed var(--accent);}
.kan-name{font-size:12px;font-weight:600;}
.kan-tech{font-size:11px;color:var(--t2);margin-top:2px;}
.kan-cnt{font-size:10px;color:var(--t3);text-align:center;margin-top:4px;}
.sdate{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--t2);}
.sdate input{font-size:12px;padding:5px 8px;border:1px solid var(--b2);border-radius:var(--rs);background:var(--s2);color:var(--text);}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.met{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.ml{font-size:11px;color:var(--t2);margin-bottom:4px;}
.mv{font-size:26px;font-weight:700;}
.atag{font-size:11px;color:var(--gt);margin-left:4px;}
.empty{text-align:center;color:var(--t3);padding:2rem 0;font-size:13px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SB_URL = 'https://jzrxjobwkgafwwbmcdzu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6cnhqb2J3a2dhZnd3Ym1jZHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzE0MjQsImV4cCI6MjA5MjI0NzQyNH0.dbpOuF0-6PKhR4yG6dyOREhiQgXnEJ-Ozhf4a-ia_sg';
const SB_H = { 'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation' };

async function sbFetch(path, method, body) {
  try {
    const r = await fetch(SB_URL+'/rest/v1/'+path, { method:method||'GET', headers:SB_H, body:body?JSON.stringify(body):null });
    if (!r.ok) throw new Error(await r.text());
    return method==='DELETE' ? null : r.json();
  } catch(e) { console.warn('SB:', e.message); return null; }
}

function jp(v,d) { try { return JSON.parse(v)||d; } catch { return d; } }
function today() { return new Date().toISOString().slice(0,10); }
function ym() { return new Date().toISOString().slice(0,7); }

const INHOUSE = ['上顎クリアリテーナー','下顎クリアリテーナー','バイトプレート'];
const STAFF_COLOR = {
  '鈴木':  '#2563c8',
  '黒木':  '#0d9488',
  '矢山':  '#7c3aed',
  '荒巻':  '#ea580c',
  '大津留': '#d97706',
  '浦里':  '#16a34a',
  '石田':  '#e11d48',
  '受付':  '#6b6660',
  '井ノ上': '#0284c7',
};
function StaffBadge({staff}){
  if(!staff) return null;
  const col = STAFF_COLOR[staff] || '#9b948e';
  return <span style={{fontSize:13,fontWeight:700,color:col,background:col+'18',padding:'2px 9px',borderRadius:20,border:'1px solid '+col+'40'}}>{staff}</span>;
}
const STAFF = ['鈴木','黒木','矢山','荒巻','大津留','浦里','石田','受付','井ノ上'];
const TECHS = ['上顎BLR','下顎BLR','上顎クリアリテーナー','下顎クリアリテーナー','上顎Begg','下顎Begg','L/A','フック付きL/A','スプリント','バイトプレート','その他'];
const CATS = ['技工物','追加アライナー','再iTero','その他'];
const KENSA_CHK = ['検査送信','orthocom','backup'];
const KENSA_LBL = { '検査送信':'検査送信','orthocom':'orthocom','backup':'back up' };
const CHK_COL = { 'チェック鈴木':'chk_suzuki','検査送信':'chk_kensashin','orthocom':'chk_orthocom','backup':'chk_backup' };
const CAT_COLORS = { '精密検査':'#3b82f6','最終検査':'#0d9488','技工物':'#ea580c','追加アライナー':'#7c3aed','再iTero':'#d97706' };

function mapRec(r) {
  return { ...r,
    cats: jp(r.cats,[]), techs: jp(r.techs,[]), tc: jp(r.tech_checks||r.tc,{}),
    checks: { '精密検査':!!r.chk_seimitsu,'最終検査':!!r.chk_saishuu,'チェック鈴木':!!r.chk_suzuki,'検査送信':!!r.chk_kensashin,'orthocom':!!r.chk_orthocom,'backup':!!r.chk_backup },
    chk_ready: !!r.chk_ready,
    chk_was_mik: !!r.chk_was_mik
  };
}

function isRecordDone(r) {
  if(!r||!r.cats) return false;
  const tc = r.tc||{};
  if (r.cats.includes('技工物')) {
    if (!r.techs.length) return false;
    // セット日の翌日以降なら完了
    if (r.setdate && r.setdate !== '未定') {
      const setdateNext = new Date(r.setdate);
      setdateNext.setDate(setdateNext.getDate()+1);
      if (new Date() >= setdateNext) return true;
    }
    const outTechs = r.techs.filter(t=>!INHOUSE.includes(t));
    const inTechs  = r.techs.filter(t=> INHOUSE.includes(t));
    // 院外：到着済みかつ到着日から1ヶ月経過
    const outDone = outTechs.every(t=>{
      const v=tc[t+':hatchu']||'未発注';
      if(v==='出来次第') return false;
      if(v!=='到着済み'&&v!=='到着') return false;
      const arrivedAt=tc[t+':arrived_at'];
      if(!arrivedAt) return false;
      const one_month_ago = new Date(); one_month_ago.setMonth(one_month_ago.getMonth()-1);
      return new Date(arrivedAt) < one_month_ago;
    });
    const inDone = inTechs.every(t=>tc[t+':souchi']);
    if(outTechs.length>0&&inTechs.length>0) return outDone&&inDone;
    if(outTechs.length>0) return outDone;
    if(inTechs.length>0) return inDone;
    return false;
  }
  if (r.checks['精密検査']||r.checks['最終検査']) return KENSA_CHK.every(k=>r.checks[k]);
  if (r.cats.includes('再iTero')) {
    if(r.setdate){const d=new Date(r.setdate);d.setDate(d.getDate()+1);if(new Date()>=d)return true;}
    return tc['itero_status']==='到着';
  }
  if (r.cats.includes('追加アライナー')) {
    if(r.setdate){const d=new Date(r.setdate);d.setDate(d.getDate()+1);if(new Date()>=d)return true;}
    return tc['ar_status']==='患者連絡済み';
  }
  return false;
}


// ---- helpers ----
function Bdg({cls,children}){ return <span className={"bdg "+cls}>{children}</span>; }
function Prog({done,total}){ if(!total)return null; return <div className="prog"><div className="progf" style={{width:Math.round(done/total*100)+'%'}}/></div>; }
function CLabel({label,checked,onChange,small}){
  return <label className={"rchk "+(checked?'done':'')} style={small?{fontSize:11,padding:'4px 8px'}:{}}>
    <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}/>
    {label}
  </label>;
}
function EditBtn({r, db, setDb, saveLocal}){
  const [open, setOpen] = useState(false);
  return <>
    <button className="btn" style={{fontSize:12,padding:'5px 10px',background:'var(--abg)',color:'var(--accent)',borderColor:'var(--accent)'}} onClick={()=>setOpen(true)}>詳細入力</button>
    {open&&<EditModal r={r} db={db} setDb={setDb} saveLocal={saveLocal} onClose={()=>setOpen(false)}/>}
  </>;
}

function DelBtn({id,db,setDb,saveLocal}){
  const del=()=>{ if(!confirm('削除しますか？'))return; const n=db.filter(r=>r.id!==id); setDb(n);saveLocal(n); sbFetch('records?id=eq.'+id,'DELETE'); };
  return <button className="btn btn-d" onClick={del}>削除</button>;
}

// ---- App ----
function App(){
  const [db,setDb]=useState([]);
  const [patients,setPatients]=useState({});
  const [tab,setTab]=useState('mik');
  const [syncing,setSyncing]=useState(false);
  const [loading,setLoading]=useState(true);
  const [inputInit,setInputInit]=useState(null);
  const [fromMik,setFromMik]=useState(false);

  const saveLocal=(d)=>{ try{localStorage.setItem('itero_db',JSON.stringify(d));}catch(e){} };

  const loadData=useCallback(async()=>{
    try{ const lp=localStorage.getItem('itero_pts'); if(lp)setPatients(JSON.parse(lp)); const ld=localStorage.getItem('itero_db'); if(ld){setDb(JSON.parse(ld).map(mapRec));setLoading(false);} }catch(e){}
    try{
      let all=[],off=0;
      while(true){ const r=await sbFetch('patients?limit=1000&offset='+off); if(!r||!r.length)break; all=all.concat(r); if(r.length<1000)break; off+=1000; }
      if(all.length){ const pm={}; all.forEach(p=>pm[p.patient_id]=p.patient_name); setPatients(pm); localStorage.setItem('itero_pts',JSON.stringify(pm)); }
      const recs=await sbFetch('records?order=created_at.desc&limit=500');
      if(recs){ const m=recs.map(mapRec).sort((a,b)=>{ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return b.date.localeCompare(a.date); }); setDb(m); localStorage.setItem('itero_db',JSON.stringify(recs)); }
    }catch(e){}
    setLoading(false);
  },[]);

  useEffect(()=>{loadData();},[]);

  const updRec=(id,ch)=>setDb(prev=>{ const n=prev.map(r=>r.id===id?{...r,...ch}:r); saveLocal(n); return n; });
  const syncAll=async()=>{ setSyncing(true); await loadData(); setSyncing(false); };

  const TABS=[{id:'mik',label:'⚠️ 未記入',cls:'ta'},{id:'inp',label:'新規入力'},{id:'iteroweek',label:'📅 今週iTero'},{id:'today',label:'📅 今週技工'},{id:'rec',label:'記録管理'},{id:'done',label:'✅ 完了'},{id:'dc',label:'確認'},{id:'dash',label:'集計'}];

  return <>
    <div id="root">
      {loading&&<div style={{position:'fixed',inset:0,background:'rgba(245,244,240,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,fontSize:14,color:'var(--t2)'}}>読み込み中...</div>}
      <div className="topbar"><h1>🦷 iTero管理</h1><button className="sync-btn" onClick={syncAll}>{syncing?'同期中...':'同期'}</button></div>
      <div className="main-tabs">{TABS.map(t=><button key={t.id} className={(t.cls||'')+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)}>{t.label}</button>)}</div>
      <div className="content">
        {tab==='mik'  && <MikTab db={db} setDb={setDb} patients={patients} setPatients={setPatients} saveLocal={saveLocal} setTab={setTab} setInputInit={setInputInit} setFromMik={setFromMik}/>}
        {tab==='iteroweek'&&<IteroWeekTab db={db} updRec={updRec}/>}
        {tab==='today'&& <TodayTab db={db} updRec={updRec}/>}
        {tab==='inp'  && <InpTab db={db} setDb={setDb} patients={patients} setPatients={setPatients} saveLocal={saveLocal} initData={inputInit} fromMik={fromMik} setFromMik={setFromMik}/>}
        {tab==='rec'  && <RecTab db={db} updRec={updRec} setDb={setDb} saveLocal={saveLocal}/>}
        {tab==='done' && <DoneTab db={db} setDb={setDb} saveLocal={saveLocal}/>}
        {tab==='dc'   && <DCTab db={db} updRec={updRec} setDb={setDb} saveLocal={saveLocal}/>}
        {tab==='dash' && <DashTab db={db}/>}
      </div>
    </div>
  </>;
}

// ---- MikTab ----
function MikTab({db,setDb,patients,setPatients,saveLocal,setTab,setInputInit,setFromMik}){
  const [pid,setPid]=useState('');
  const [name,setName]=useState('');
  const [staff,setStaff]=useState('');
  const [atag,setAtag]=useState('');
  const [scanDate,setScanDate]=useState(today());
  const [msg,setMsg]=useState(null);

  const lookup=async(id)=>{
    if(!id){setAtag('');return;}
    if(patients[id]){setName(patients[id]);setAtag('✓');return;}
    if(id.length>=5){ setAtag('検索中...'); const r=await sbFetch('patients?patient_id=eq.'+id+'&limit=1'); if(r&&r.length){setPatients(p=>({...p,[id]:r[0].patient_name}));setName(r[0].patient_name);setAtag('✓');}else setAtag(''); }
  };

  const save=async()=>{
    if(!pid||!name){setMsg({err:'IDと名前は必須です'});return;}
    if(!sei&&!sai&&cats.length===0){setMsg({err:'検査（精密・最終）またはデータの種類を最低1つ選択してください'});return;}
    if(techs.length>0&&!cats.includes('技工物')){setMsg({err:'技工物内容を選択した場合は種別「技工物」もチェックしてください'});return;}
    setMsg({info:'保存中...'});
    const body={date:today(),patient_id:pid,patient_name:name,staff,cats:'[]',techs:'[]',old_flag:false,note:'未記入',setdate:null,chk_seimitsu:false,chk_saishuu:false,chk_isogu:false,chk_mikiroku:true,chk_suzuki:false,chk_mokei:false,chk_tochaku:false,chk_kensashin:false,chk_orthocom:false,chk_backup:false,chk_datachecked:false};
    const r=await sbFetch('records','POST',body);
    const nr=mapRec(r?r[0]:{...body,id:Date.now(),tc:{},cats:[],techs:[]});
    if(!patients[pid]){await sbFetch('patients','POST',{patient_id:pid,patient_name:name});setPatients(p=>({...p,[pid]:name}));}
    const n=[nr,...db].sort(function(a,b){ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return b.date.localeCompare(a.date); }); setDb(n);saveLocal(n);
    setMsg({ok:'登録しました！'});setPid('');setName('');setStaff('');setAtag('');
    setTimeout(()=>setMsg(null),3000);
  };

  const goDetail=(r)=>{
    setInputInit({pid:r.patient_id,name:r.patient_name,date:r.date,staff:r.staff||'',wasMikiroku:true});
    setFromMik(true);
    const n=db.filter(x=>x.id!==r.id); setDb(n);saveLocal(n);
    sbFetch('records?id=eq.'+r.id,'DELETE');
    setTab('inp');
  };

  const list=db.filter(r=>r.chk_mikiroku);
  return <div>
    <div className="card" style={{borderColor:'#fca5a5',background:'#fff5f5'}}>
      <div className="ct" style={{color:'var(--rt)'}}>⚠️ 記録未記入 — 簡易登録</div>
      <p style={{fontSize:12,color:'var(--rt)',marginBottom:12}}>患者IDと名前だけ入力。担当者が後で詳細を追加します。</p>
      <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:10}}>
        <div className="f" style={{width:130,marginBottom:0}}><label>患者ID</label><input value={pid} onChange={e=>{setPid(e.target.value);lookup(e.target.value);}} placeholder="21245"/></div>
        <div className="f" style={{flex:1,marginBottom:0}}><label>患者名 <span className="atag">{atag}</span></label><input value={name} onChange={e=>setName(e.target.value)} placeholder="IDで自動入力"/></div>
      </div>
      <div className="f" style={{marginBottom:10}}>
        <label>担当</label>
        <select value={staff} onChange={e=>setStaff(e.target.value)}>
          <option value="">選択</option>{STAFF.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      {msg&&<div className={"al "+(msg.ok?'al-ok':msg.err?'al-err':'')} style={msg.info?{background:'var(--s2)',color:'var(--t2)'}:{}}>{msg.ok||msg.err||msg.info}</div>}
      <button className="btn" style={{width:'100%',background:'var(--red)',color:'#fff',borderColor:'var(--red)'}} onClick={save}>未記入として登録</button>
    </div>
    <div style={{fontSize:13,fontWeight:600,color:'var(--rt)',marginBottom:8}}>未記入一覧</div>
    {list.length===0
      ? <p className="empty" style={{color:'var(--gt)'}}>✓ 未記入なし</p>
      : list.map(r=><div key={r.id} className="rc" style={{borderLeft:'4px solid var(--red)',background:'#fff5f5',borderColor:'#fca5a5'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
                <div className="rn" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span>{r.patient_name}</span>
                  <Bdg cls="b-red">未記入</Bdg>
                </div>
                <div className="rm" style={{marginTop:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span>{r.patient_id}　📅 {r.date}</span>
                  <StaffBadge staff={r.staff}/>
                </div>
              </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn" style={{fontSize:12,padding:'5px 10px',background:'var(--ambg)',color:'var(--amt)',borderColor:'#fde68a'}} onClick={()=>goDetail(r)}>詳細入力</button>
              <DelBtn id={r.id} db={db} setDb={setDb} saveLocal={saveLocal}/>
            </div>
          </div>
        </div>)
    }
  </div>;
}

// ---- InpTab ----
function InpTab({db,setDb,patients,setPatients,saveLocal,initData,fromMik,setFromMik}){
  const [pid,setPid]=useState('');
  const [name,setName]=useState('');
  const [date,setDate]=useState(today());
  const [staff,setStaff]=useState('');
  const [cats,setCats]=useState([]);
  const [techs,setTechs]=useState([]);
  const [sei,setSei]=useState(false);
  const [sai,setSai]=useState(false);
  const [old,setOld]=useState(false);
  const [iso,setIso]=useState(false);
  const [note,setNote]=useState('');
  const [atag,setAtag]=useState('');
  const [msg,setMsg]=useState(null);

  useEffect(()=>{
    if(initData){ setPid(initData.pid||'');setName(initData.name||'');setDate(initData.date||today());setStaff(initData.staff||'');setAtag(initData.name?'✓':''); }
  },[initData]);

  const lookup=async(id)=>{
    if(!id){setAtag('');return;}
    if(patients[id]){setName(patients[id]);setAtag('✓');return;}
    if(id.length>=5){ setAtag('検索中...'); const r=await sbFetch('patients?patient_id=eq.'+id+'&limit=1'); if(r&&r.length){setPatients(p=>({...p,[id]:r[0].patient_name}));setName(r[0].patient_name);setAtag('✓');}else setAtag(''); }
  };

  const tog=(arr,set,v)=>set(a=>a.includes(v)?a.filter(x=>x!==v):[...a,v]);

  const save=async()=>{
    if(!pid||!name){setMsg({err:'IDと名前は必須です'});return;}
    setMsg({info:'保存中...'});
    const wasMik=initData&&initData.wasMikiroku;
    const body={date,patient_id:pid,patient_name:name,staff,cats:JSON.stringify(cats),techs:JSON.stringify(techs),old_flag:old,note,setdate:null,chk_seimitsu:sei,chk_saishuu:sai,chk_isogu:iso,chk_mikiroku:false,chk_datachecked:false,chk_suzuki:false,chk_mokei:false,chk_tochaku:false,chk_kensashin:false,chk_orthocom:false,chk_backup:false,chk_was_mik:!!wasMik};
    const r=await sbFetch('records','POST',body);
    const nr=mapRec(r?r[0]:{...body,id:Date.now(),tc:{},cats,techs});
    if(!patients[pid]){await sbFetch('patients','POST',{patient_id:pid,patient_name:name});setPatients(p=>({...p,[pid]:name}));}
    const n=[nr,...db].sort(function(a,b){ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return b.date.localeCompare(a.date); }); setDb(n);saveLocal(n);
    setMsg({ok:'登録しました！'});
    setPid('');setName('');setDate(today());setStaff('');setCats([]);setTechs([]);setSei(false);setSai(false);setOld(false);setIso(false);setNote('');setAtag('');
    if(setFromMik)setFromMik(false);
    setTimeout(()=>setMsg(null),3000);
  };

  return <div>
    <div className="card">
      <div className="ct">患者情報</div>
      <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:10}}>
        <div className="f" style={{width:130,marginBottom:0}}><label>患者ID</label><input value={pid} onChange={e=>{setPid(e.target.value);lookup(e.target.value);}} placeholder="21245"/></div>
        <div className="f" style={{flex:1,marginBottom:0}}><label>患者名 <span className="atag">{atag}</span></label><input value={name} onChange={e=>setName(e.target.value)} placeholder="IDで自動入力"/></div>
      </div>
      <div className="row2">
        <div className="f" style={{marginBottom:0}}><label>日付</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="f" style={{marginBottom:0}}><label>担当</label><select value={staff} onChange={e=>setStaff(e.target.value)}><option value="">選択</option>{STAFF.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
    </div>
    <div className="card">
      <div className="ct">検査</div>
      <div className="chkrow">
        <label className="ci"><input type="checkbox" checked={sei} onChange={e=>setSei(e.target.checked)}/> 精密検査</label>
        <label className="ci"><input type="checkbox" checked={sai} onChange={e=>setSai(e.target.checked)}/> 最終検査</label>
      </div>
    </div>
    <div className="card">
      <div className="ct">データの種類</div>
      <div className="f"><label>種別（複数選択可）</label><div className="chips">{CATS.map(c=><span key={c} className={"chip"+(cats.includes(c)?' on':'')} onClick={()=>tog(cats,setCats,c)}>{c}</span>)}</div></div>
      <div className="f"><label>技工物内容（複数選択可）</label><div className="chips">{TECHS.map(t=><span key={t} className={"chip"+(techs.includes(t)?' on':'')} onClick={()=>tog(techs,setTechs,t)}>{t}</span>)}</div></div>
      <div className="chkrow" style={{marginBottom:10}}>
        <label className="ci"><input type="checkbox" checked={old} onChange={e=>setOld(e.target.checked)}/> 旧</label>
        <label className="ci iso"><input type="checkbox" checked={iso} onChange={e=>setIso(e.target.checked)}/> 🚨 急ぎ</label>
      </div>
      <div className="f" style={{marginBottom:0}}><label>備考</label><input value={note} onChange={e=>setNote(e.target.value)} placeholder="特記事項など"/></div>
    </div>
    {msg&&<div className={"al "+(msg.ok?'al-ok':msg.err?'al-err':'')} style={msg.info?{background:'var(--s2)',color:'var(--t2)'}:{}}>{msg.ok||msg.err||msg.info}</div>}
    <div className="btn-row">
      <button className="btn btn-p" onClick={save}>登録する</button>
      <button className="btn" onClick={()=>{setPid('');setName('');setDate(today());setStaff('');setCats([]);setTechs([]);setSei(false);setSai(false);setOld(false);setIso(false);setNote('');setAtag('');}}>クリア</button>
    </div>
  </div>;
}

// ---- RecTab ----
const SUBS=['すべて','技工物(院外)','技工物(院内)','精密検査','最終検査','再iTero','追加アライナー'];

function RecTab({db,updRec,setDb,saveLocal}){
  const [sub,setSub]=useState('技工物(院外)');
  const [view,setView]=useState('list');
  const [q,setQ]=useState('');
  const [fSt,setFSt]=useState('');
  const [F,setF]=useState({});
  const togF=k=>setF(f=>({...f,[k]:!f[k]}));

  const matchSub=r=>{
    if(r.chk_mikiroku||isRecordDone(r))return false;
    if(sub==='すべて') return true;
    if(sub==='技工物(院外)') return r.cats.includes('技工物')&&r.techs.some(t=>!INHOUSE.includes(t));
    if(sub==='技工物(院内)') return r.cats.includes('技工物')&&r.techs.some(t=>INHOUSE.includes(t))&&!r.techs.some(t=>!INHOUSE.includes(t));
    if(sub==='精密検査') return r.checks['精密検査'];
    if(sub==='最終検査') return r.checks['最終検査'];
    if(sub==='再iTero') return r.cats.includes('再iTero');
    if(sub==='追加アライナー') return r.cats.includes('追加アライナー');
    return true;
  };

  const weekRange=()=>{ const now=new Date(),day=now.getDay(),mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return{s:mon.toISOString().slice(0,10),e:sun.toISOString().slice(0,10)}; };

  let list=db.filter(r=>{
    if(!matchSub(r))return false;
    if(q&&!r.patient_name.toLowerCase().includes(q.toLowerCase())&&!r.patient_id.includes(q))return false;
    if(fSt&&r.staff!==fSt)return false;
    if(F.iso&&!r.chk_isogu)return false;
    if(F.week){const{s,e}=weekRange();if(!r.setdate||r.setdate<s||r.setdate>e)return false;}
    if(F.mokei){const tc=r.tc;if(!r.techs.some(t=>!tc[t+':mokei']))return false;}
    if(F.souchi){const tc=r.tc;if(!r.techs.filter(t=>INHOUSE.includes(t)).some(t=>!tc[t+':souchi']))return false;}
    if(F.mizen){const tc=r.tc;if(!r.techs.filter(t=>!INHOUSE.includes(t)).some(t=>{const v=tc[t+':hatchu']||'未発注';return v==='未発注';}))return false;}
    if(F.dekisidai){const tc=r.tc;if(!r.techs.filter(t=>!INHOUSE.includes(t)).some(t=>tc[t+':hatchu']==='出来次第'))return false;}
    if(F.it_miz&&(r.tc['itero_status']||'未発注')!=='未発注')return false;
    if(F.it_chu&&(r.tc['itero_status']||'未発注')!=='発注済み')return false;
    if(F.it_ok&&(r.tc['itero_status']||'未発注')!=='到着')return false;
    if(F.ar_miz&&(r.tc['ar_status']||'未作成')!=='未作成')return false;
    if(F.ar_inc&&(r.tc['ar_status']||'未作成')!=='院長作成中')return false;
    if(F.ar_ok&&(r.tc['ar_status']||'未作成')!=='到着')return false;
    if(F.ar_ren&&(r.tc['ar_status']||'未作成')!=='患者連絡済み')return false;
    if(F.ks_send&&r.checks['検査送信'])return false;
    if(F.ks_ortho&&r.checks['orthocom'])return false;
    if(F.ks_bk&&r.checks['backup'])return false;
    if(F.ks_suz&&r.checks['チェック鈴木'])return false;
    return true;
  });
  if(F.sort)list=[...list].sort((a,b)=>{ if(!a.setdate&&!b.setdate)return 0;if(!a.setdate)return 1;if(!b.setdate)return-1;return a.setdate.localeCompare(b.setdate); });

  const updTC=(id,k,v,extra)=>{ const r=db.find(x=>x.id===id);if(!r)return;const tc={...r.tc,[k]:v,...(extra||{})};updRec(id,{tc});sbFetch('records?id=eq.'+id,'PATCH',{tech_checks:JSON.stringify(tc)}); };
  const updChk=(id,k,v)=>{ const r=db.find(x=>x.id===id);if(!r)return;updRec(id,{checks:{...r.checks,[k]:v}});const col=CHK_COL[k];if(col){const p={};p[col]=v;sbFetch('records?id=eq.'+id,'PATCH',p);} };
  const updField=(id,f,v)=>{ updRec(id,{[f]:v});const p={};p[f]=v;sbFetch('records?id=eq.'+id,'PATCH',p); };

  const FB=({k,label,os})=>{ const on=F[k]; return <button className={"fb"+(on?' on':'')} style={on?{}:(os||{})} onClick={()=>togF(k)}>{label}</button>; };
  const isKanSub=sub==='技工物(院外)'||sub==='技工物(院内)'||sub==='再iTero'||sub==='追加アライナー';

  return <div>
    <div className="stabs">{SUBS.map(s=><button key={s} className={"stab"+(sub===s?' on':'')} onClick={()=>{setSub(s);setView('list');setF({});}}>{s}</button>)}</div>
    <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="患者名・IDで検索..." style={{flex:1,minWidth:110,fontSize:13,padding:'8px 10px',border:'1px solid var(--b2)',borderRadius:'var(--rs)',background:'var(--surface)',color:'var(--text)',outline:'none'}}/>
      <select value={fSt} onChange={e=>setFSt(e.target.value)} style={{fontSize:13,padding:'8px',border:'1px solid var(--b2)',borderRadius:'var(--rs)',background:'var(--surface)',color:'var(--text)',WebkitAppearance:'none',outline:'none'}}>
        <option value="">担当: 全員</option>{STAFF.map(s=><option key={s}>{s}</option>)}
      </select>
    </div>
    {isKanSub&&<div className="view-toggle"><button className={"vbtn"+(view==='list'?' on':'')} onClick={()=>setView('list')}>📋 一覧</button><button className={"vbtn"+(view==='kanban'?' on':'')} onClick={()=>setView('kanban')}>📊 カンバン</button></div>}
    {(sub==='技工物(院外)'||sub==='技工物(院内)')&&view==='list'&&<div className="fbtns">
      <FB k="sort" label="📅 セット日順"/><FB k="week" label="📌 今週"/><FB k="iso" label="🚨 急ぎ" os={{color:'var(--ot)',borderColor:'#fed7aa'}}/>
      <FB k="mokei" label="📦 模型未" os={{color:'var(--rt)',borderColor:'#fca5a5'}}/><FB k="souchi" label="🔧 装置未" os={{color:'var(--pt)',borderColor:'#c4b5fd'}}/><FB k="mizen" label="📮 未発注" os={{color:'var(--amt)',borderColor:'#fde68a'}}/>
        <FB k="dekisidai" label="📞 出来次第" os={{color:'var(--pt)',borderColor:'#c4b5fd'}}/>
    </div>}
    {sub==='再iTero'&&view==='list'&&<div className="fbtns"><FB k="it_miz" label="📮 未発注" os={{color:'var(--rt)',borderColor:'#fca5a5'}}/><FB k="it_chu" label="🔄 発注済み" os={{color:'var(--amt)',borderColor:'#fde68a'}}/><FB k="it_ok" label="✅ 到着" os={{color:'var(--gt)',borderColor:'#bbf7d0'}}/></div>}
    {sub==='追加アライナー'&&view==='list'&&<div className="fbtns"><FB k="ar_miz" label="📋 未作成" os={{color:'var(--rt)',borderColor:'#fca5a5'}}/><FB k="ar_inc" label="👨‍⚕️ 院長作成中" os={{color:'var(--amt)',borderColor:'#fde68a'}}/><FB k="ar_ok" label="✅ 到着" os={{color:'var(--gt)',borderColor:'#bbf7d0'}}/><FB k="ar_ren" label="📞 患者連絡済み" os={{color:'var(--pt)',borderColor:'#c4b5fd'}}/></div>}
    {(sub==='精密検査'||sub==='最終検査')&&<div className="fbtns"><FB k="ks_send" label="📤 送信未" os={{color:'var(--rt)',borderColor:'#fca5a5'}}/><FB k="ks_ortho" label="💻 orthocom未" os={{color:'var(--rt)',borderColor:'#fca5a5'}}/><FB k="ks_bk" label="💾 backup未" os={{color:'var(--rt)',borderColor:'#fca5a5'}}/><FB k="ks_suz" label="✅ 確認未" os={{color:'var(--amt)',borderColor:'#fde68a'}}/></div>}
    {view==='kanban'&&sub==='技工物(院外)'&&<GaikouKanban list={list} updTC={updTC}/>}
    {view==='kanban'&&sub==='技工物(院内)'&&<InhouKanban list={list} updTC={updTC}/>}
    {view==='kanban'&&sub==='追加アライナー'&&<ArKanban list={list} updTC={updTC}/>}
    {view==='kanban'&&sub==='再iTero'&&<IteroKanban list={list} updTC={updTC}/>}
    {view==='list'&&(list.length===0?<p className="empty">該当なし</p>:
      sub==='すべて'
        ? <AllView list={list} db={db} setDb={setDb} saveLocal={saveLocal} updTC={updTC} updChk={updChk} updField={updField}/>
        : list.map(r=><RCard key={r.id} r={r} sub={sub} db={db} setDb={setDb} saveLocal={saveLocal} updTC={updTC} updChk={updChk} updField={updField}/>)
    )}
  </div>;
}



// ---- EditModal ----
function EditModal({r, db, setDb, saveLocal, onClose}){
  const [staff, setStaff] = useState(r.staff||'');
  const [note, setNote]   = useState(r.note||'');
  const [date, setDate]   = useState(r.date||today());
  const [setdate, setSetdate] = useState(r.setdate||'');
  const [cats, setCats]   = useState(r.cats||[]);
  const [techs, setTechs] = useState(r.techs||[]);
  const [sei, setSei]     = useState(r.checks['精密検査']||false);
  const [sai, setSai]     = useState(r.checks['最終検査']||false);
  const [iso, setIso]     = useState(r.chk_isogu||false);
  const [msg, setMsg]     = useState(null);

  const tog=(arr,set,v)=>set(a=>a.includes(v)?a.filter(x=>x!==v):[...a,v]);

  const save = async () => {
    setMsg({info:'保存中...'});
    const patch = {
      staff, note, date, setdate:setdate||null,
      cats:JSON.stringify(cats), techs:JSON.stringify(techs),
      chk_seimitsu:sei, chk_saishuu:sai, chk_isogu:iso,
    };
    const next = db.map(x => x.id===r.id ? {...x,...patch,cats,techs,chk_isogu:iso,checks:{...x.checks,'精密検査':sei,'最終検査':sai}} : x);
    setDb(next); saveLocal(next);
    await sbFetch('records?id=eq.'+r.id,'PATCH',patch);
    setMsg({ok:'保存しました！'});
    setTimeout(()=>onClose(),1000);
  };

  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:'var(--surface)',width:'100%',maxWidth:600,maxHeight:'85vh',overflowY:'auto',borderRadius:'16px 16px 0 0',padding:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700}}>✏️ 修正：{r.patient_name}</div>
        <button onClick={onClose} style={{fontSize:18,background:'none',border:'none',cursor:'pointer',color:'var(--t2)'}}>✕</button>

// ---- Drag & Drop utils ----
let dragData = null;

function onDragStart(e, data) {
  dragData = data;
  e.currentTarget.classList.add('dragging');
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
}
function onDragOver(e, colEl) {
  e.preventDefault();
  colEl && colEl.classList.add('drag-over');
}
function onDragLeave(e, colEl) {
  colEl && colEl.classList.remove('drag-over');
}
function onDrop(e, colEl, onDrop) {
  e.preventDefault();
  colEl && colEl.classList.remove('drag-over');
  if(dragData) { onDrop(dragData); dragData = null; }
}

function sortSet(arr){ return [...arr].sort((a,b)=>{ const sa=a.r?a.r.setdate:a.setdate,sb=b.r?b.r.setdate:b.setdate; if(!sa&&!sb)return 0;if(!sa)return 1;if(!sb)return-1;return sa.localeCompare(sb); }); }

  const NEXT={'未発注':'作製中','作製中':'到着済み','到着済み':'未発注','到着':'到着済み'};
  const cols={};COLS.forEach(c=>cols[c.key]=[]);

    if(sub==='精密検査')return r.checks['精密検査'];
    if(sub==='最終検査')return r.checks['最終検査'];
    if(sub==='再iTero')return r.cats.includes('再iTero');
    if(sub==='追加アライナー')return r.cats.includes('追加アライナー');
    return true;
  };
  const list=db.filter(r=>!r.chk_mikiroku&&isRecordDone(r)&&matchDone(r)&&(!q||r.patient_name.toLowerCase().includes(q.toLowerCase())||r.patient_id.includes(q)));
  const del=id=>{ if(!confirm('削除しますか？'))return;const n=db.filter(r=>r.id!==id);setDb(n);saveLocal(n);sbFetch('records?id=eq.'+id,'DELETE'); };
  return <div>
    <div className="stabs">{DONE_SUBS.map(s=><button key={s} className={"stab"+(sub===s?' on':'')} onClick={()=>setSub(s)}>{s}</button>)}</div>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="患者名・IDで検索..." style={{width:'100%',fontSize:13,padding:'8px 10px',border:'1px solid var(--b2)',borderRadius:'var(--rs)',background:'var(--surface)',color:'var(--text)',outline:'none',marginBottom:10}}/>

    <div style={{fontSize:12,color:'var(--t2)',marginBottom:12}}>完了 {list.length}件</div>
    {list.length===0?<p className="empty">完了済みの記録はありません</p>:list.map(r=>{
      const cats=[]; if(r.checks['精密検査'])cats.push('精密検査');if(r.checks['最終検査'])cats.push('最終検査');r.cats.forEach(c=>{if(!cats.includes(c))cats.push(c);});
      return <div key={r.id} className="rc" style={{borderLeft:'4px solid var(--green)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{flex:1}}>
            <div className="rn">{r.patient_name} {r.old_flag&&<Bdg cls="b-warn">旧</Bdg>} <Bdg cls="b-ok">完了</Bdg></div>
            <div className="rm">{r.patient_id}　{r.date}　担当: {r.staff||'—'}</div>
            <div style={{marginTop:4,display:'flex',flexWrap:'wrap',gap:4}}>{cats.map(c=>{const col=CAT_COLORS[c]||'#9b948e';return <span key={c} style={{fontSize:10,padding:'1px 6px',borderRadius:8,border:'1px solid '+col+'40',color:col,fontWeight:600}}>{c}</span>;})}</div>
            {r.techs.length>0&&<div className="rm">{r.techs.join('・')}</div>}
            {r.setdate&&<div className="rm">📅 セット: {r.setdate}</div>}
          </div>
          <div style={{display:'flex',gap:6}}>
            <EditBtn r={r} db={db} setDb={setDb} saveLocal={saveLocal}/>
            <button className="btn btn-d" onClick={()=>del(r.id)}>削除</button>
          </div>
        </div>
      </div>;
    })}
  </div>;
}

// ---- DCTab ----
function DCTab({db,updRec,setDb,saveLocal}){
  const [mode,setMode]=useState('all');
  const [q,setQ]=useState('');
  const [adminMode,setAdminMode]=useState(false);
  const [pwInput,setPwInput]=useState('');
  const [showPw,setShowPw]=useState(false);
  const ADMIN_PW='daimon1020';
  const tryAdmin=()=>{
    if(pwInput===ADMIN_PW){setAdminMode(true);setShowPw(false);setPwInput('');}
    else{alert('パスワードが違います');}
  };
  const getRC=r=>{ const c=[]; if(r.checks['精密検査'])c.push('精密検査');if(r.checks['最終検査'])c.push('最終検査');r.cats.forEach(x=>{if(!c.includes(x))c.push(x);});if(!c.length)c.push('その他');return c; };
  let list=db.filter(r=>!r.chk_mikiroku);
  if(mode==='unc')list=list.filter(r=>!r.chk_datachecked);
  if(q)list=list.filter(r=>r.patient_name.toLowerCase().includes(q.toLowerCase())||r.patient_id.includes(q));
  const grouped={},order=[];
  list.forEach(r=>{ if(!grouped[r.patient_id]){grouped[r.patient_id]={pid:r.patient_id,name:r.patient_name,recs:[]};order.push(r.patient_id);}grouped[r.patient_id].recs.push(r); });
  const updChk=(id,k,v)=>{ const r=db.find(x=>x.id===id);if(!r)return;updRec(id,{checks:{...r.checks,[k]:v}});const col=CHK_COL[k];if(col){const p={};p[col]=v;sbFetch('records?id=eq.'+id,'PATCH',p);} };
  const updDC=(id,v)=>{ updRec(id,{chk_datachecked:v});sbFetch('records?id=eq.'+id,'PATCH',{chk_datachecked:v}); };
  const CCOL={'精密検査':'#3b82f6','最終検査':'#0d9488','技工物':'#ea580c','追加アライナー':'#7c3aed','再iTero':'#d97706'};
  return <div>
    <div className="fbtns" style={{marginBottom:8}}>
      <button className="fb" style={mode==='all'?{background:'var(--accent)',color:'#fff',borderColor:'var(--accent)'}:{}} onClick={()=>setMode('all')}>すべて</button>
      <button className="fb" style={mode==='unc'?{background:'var(--accent)',color:'#fff',borderColor:'var(--accent)'}:{}} onClick={()=>setMode('unc')}>未確認のみ</button>
    </div>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="患者名・IDで検索..." style={{width:'100%',fontSize:13,padding:'8px 10px',border:'1px solid var(--b2)',borderRadius:'var(--rs)',background:'var(--surface)',color:'var(--text)',outline:'none',marginBottom:10}}/>
    <div style={{overflowX:'auto',borderRadius:'var(--r)',border:'1px solid var(--border)'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:580}}>
        <thead><tr style={{background:'var(--s2)',borderBottom:'2px solid var(--border)'}}>
          <th style={{padding:'8px',textAlign:'left',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>日付</th>
          <th style={{padding:'8px',textAlign:'left',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>患者名</th>
          <th style={{padding:'8px',textAlign:'left',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>担当</th>
          <th style={{padding:'8px',textAlign:'left',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>種別</th>
          <th style={{padding:'8px',textAlign:'center',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>検査送信</th>
          <th style={{padding:'8px',textAlign:'center',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>orthocom</th>
          <th style={{padding:'8px',textAlign:'center',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>back up</th>
          <th style={{padding:'8px',textAlign:'center',fontSize:11,color:'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>確認済み</th>
          {adminMode&&<th style={{padding:'8px',fontSize:11,color:'var(--rt)',fontWeight:600}}></th>}
        </tr></thead>
        <tbody>
          {order.length===0
            ?<tr><td colSpan={8} style={{textAlign:'center',padding:'2rem',color:'var(--t3)'}}>データなし</td></tr>
            :order.flatMap(pid=>{
              const g=grouped[pid];
              const allCats=[...new Set(g.recs.flatMap(r=>getRC(r)))];
              const mainCat=allCats[0]||'その他';
              const borderCol=CCOL[mainCat]||'var(--b2)';
              return g.recs.map((r,ri)=>{
                const rc=getRC(r);
                const needsK=rc.includes('精密検査')||rc.includes('最終検査');
                const rowBg=r.chk_datachecked?'#f0fdf4':ri%2===0?'var(--surface)':'#fafaf9';
                return <tr key={r.id} style={{background:rowBg,borderBottom:'1px solid var(--border)',borderLeft:ri===0?'3px solid '+borderCol:'3px solid transparent'}}>
                  <td style={{padding:'8px',color:'var(--t2)',whiteSpace:'nowrap'}}>{r.date}</td>
                  <td style={{padding:'8px',fontWeight:700}}>
                    {ri===0?<div><div>{g.name}</div><div style={{fontSize:10,color:'var(--t3)'}}>{g.pid}</div></div>:''}
                  </td>
                  <td style={{padding:'8px',whiteSpace:'nowrap'}}><StaffBadge staff={r.staff}/></td>
                  <td style={{padding:'6px 8px'}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
                      {rc.map(c=>{const col=CCOL[c]||'#9b948e';return <span key={c} style={{fontSize:10,padding:'1px 5px',borderRadius:8,background:col+'18',border:'1px solid '+col+'40',color:col,fontWeight:600,whiteSpace:'nowrap'}}>{c}</span>;})}
                    </div>
                  </td>
                  {KENSA_CHK.map(k=><td key={k} style={{padding:'8px',textAlign:'center'}}>
                    {needsK?<input type="checkbox" checked={!!r.checks[k]} onChange={e=>updChk(r.id,k,e.target.checked)} style={{width:16,height:16,accentColor:'var(--green)',cursor:'pointer'}}/>:<span style={{color:'var(--t3)',fontSize:11}}>—</span>}
                  </td>)}
                  <td style={{padding:'8px',textAlign:'center'}}>
                    {adminMode
                      ? <input type="checkbox" checked={!!r.chk_datachecked} onChange={e=>updDC(r.id,e.target.checked)} style={{width:16,height:16,accentColor:'var(--accent)',cursor:'pointer'}}/>
                      : <span style={{fontSize:14}}>{r.chk_datachecked?'✅':'⬜'}</span>
                    }
                  </td>
                  <td style={{padding:'6px 8px',textAlign:'center'}}>
                    <button className="btn btn-d" onClick={()=>{if(!confirm('削除しますか？'))return;const n=db.filter(x=>x.id!==r.id);setDb(n);saveLocal(n);sbFetch('records?id=eq.'+r.id,'DELETE').catch(()=>{});}}>削除</button>
                  </td>
                </tr>;
              });
            })
          }
        </tbody>
      </table>
    </div>
  </div>;
}

// ---- IteroWeekGrid ----
const IWEEK_SECTIONS = [
  { key:'精密検査',      label:'精密検査',      color:'#3b82f6', match: r=>r.checks['精密検査'] },
  { key:'最終検査',      label:'最終検査',      color:'#0d9488', match: r=>r.checks['最終検査'] },
  { key:'技工物',        label:'技工物',        color:'#ea580c', match: r=>r.cats.includes('技工物') },
  { key:'再iTero',       label:'再iTero',       color:'#d97706', match: r=>r.cats.includes('再iTero') },
  { key:'追加アライナー',label:'追加アライナー', color:'#7c3aed', match: r=>r.cats.includes('追加アライナー') },
  { key:'その他',        label:'その他',        color:'#9b948e', match: r=>!r.checks['精密検査']&&!r.checks['最終検査']&&!r.cats.includes('技工物')&&!r.cats.includes('再iTero')&&!r.cats.includes('追加アライナー') },
];
const CC_MAP = {'精密検査':'#3b82f6','最終検査':'#0d9488','技工物':'#ea580c','追加アライナー':'#7c3aed','再iTero':'#d97706'};

function IteroWeekGrid({list, updReady, dayLabel}){
  return <div>
    {IWEEK_SECTIONS.map(sec=>{
      const items = list.filter(sec.match);
      if(!items.length) return null;
      return <div key={sec.key} style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'5px 10px',background:sec.color+'10',borderRadius:'var(--rs)',borderLeft:'4px solid '+sec.color}}>
          <span style={{fontSize:12,fontWeight:700,color:sec.color}}>{sec.label}</span>
          <span style={{fontSize:11,color:sec.color,background:sec.color+'20',padding:'1px 8px',borderRadius:10,fontWeight:600}}>{items.length}件</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:8}}>
          {items.map(r=>{
            const checked=r.chk_ready;
            const allCats=[...(r.checks['精密検査']?['精密検査']:[]),...(r.checks['最終検査']?['最終検査']:[]),...(r.cats||[])].filter((v,i,a)=>a.indexOf(v)===i);
            return <div key={r.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'3px solid '+(checked?'var(--green)':sec.color),borderRadius:'var(--rs)',padding:'8px 10px',opacity:checked?0.65:1}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:4}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.patient_name}</div>
                  <div style={{marginTop:2}}><StaffBadge staff={r.staff}/></div>
                  {r.techs&&r.techs.length>0&&<div style={{fontSize:10,color:'var(--t2)',marginTop:2}}>{r.techs.join('・')}</div>}
                  <div style={{fontSize:10,color:'var(--accent)',fontWeight:600,marginTop:3}}>📅 {dayLabel(r.date)}</div>
                </div>
                <label style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',flexShrink:0}}>
                  <input type="checkbox" checked={!!checked} onChange={e=>updReady(r.id,e.target.checked)} style={{width:17,height:17,accentColor:'var(--green)',cursor:'pointer'}}/>
                  <span style={{fontSize:9,color:checked?'var(--gt)':'var(--t3)',whiteSpace:'nowrap'}}>{checked?'確認済':'確認'}</span>
                </label>
              </div>
            </div>;
          })}
        </div>
      </div>;
    })}
  </div>;
}

// ---- IteroWeekTab ----
function IteroWeekTab({db, updRec}){
  const [selDate, setSelDate] = useState(today());
  const [filter, setFilter] = useState('today');
  const getTargetDates = () => {
    const base = new Date(selDate);
    const fmt = d => d.toISOString().slice(0,10);
    const d1 = new Date(base); d1.setDate(base.getDate()-1);
    const d2 = new Date(base); d2.setDate(base.getDate()-2);
    if(filter==='today')     return [selDate];
    if(filter==='yesterday') return [fmt(d1)];
    if(filter==='before')    return [fmt(d2)];
    return [selDate, fmt(d1), fmt(d2)];
  };
  const targets = getTargetDates();
  const list = db.filter(r=>!r.chk_mikiroku&&r.date&&targets.includes(r.date))
    .sort((a,b)=>{ if(a.date!==b.date)return b.date.localeCompare(a.date); return a.patient_name.localeCompare(b.patient_name); });
  const updReady = (id, val) => { updRec(id,{chk_ready:val}); sbFetch('records?id=eq.'+id,'PATCH',{chk_ready:val}); };
  const FILTER_BTNS = [{k:'today',label:'今日'},{k:'yesterday',label:'前日'},{k:'before',label:'前々日'},{k:'all',label:'3日分'}];
  const dayLabel = d => { const diff=Math.round((new Date(selDate)-new Date(d))/(1000*60*60*24)); if(diff===0)return '今日';if(diff===1)return '前日';if(diff===2)return '前々日';return d; };
  const CCOL2 = {'再iTero':'#d97706','追加アライナー':'#7c3aed'};
  return <div>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
      <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{fontSize:13,padding:'7px 10px',border:'1px solid var(--b2)',borderRadius:'var(--rs)',background:'var(--surface)',color:'var(--text)',outline:'none'}}/>
      <div className="fbtns" style={{margin:0}}>
        {FILTER_BTNS.map(b=><button key={b.k} className={"fb"+(filter===b.k?' on':'')} style={filter===b.k?{background:'var(--accent)',color:'#fff',borderColor:'var(--accent)'}:{}} onClick={()=>setFilter(b.k)}>{b.label}</button>)}
      </div>
    </div>
    <div style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>{list.length}件</div>
    {list.length===0
      ? <p className="empty">該当するデータはありません</p>
      : <IteroWeekGrid list={list} updReady={updReady} dayLabel={dayLabel}/>
    }
  </div>;
}

// ---- TodayTab ----
function TodayTab({db, updRec}){
  const [selDate, setSelDate] = useState(today());
  const [filter, setFilter] = useState('today');
  const getTargetDates = () => {
    const base = new Date(selDate);
    const fmt = d => d.toISOString().slice(0,10);
    const d1 = new Date(base); d1.setDate(base.getDate()+1);
    const d2 = new Date(base); d2.setDate(base.getDate()+2);
    if(filter==='today')    return [selDate];
    if(filter==='tomorrow') return [fmt(d1)];
    if(filter==='after')    return [fmt(d2)];
    return [selDate, fmt(d1), fmt(d2)];
  };
  const targets = getTargetDates();
  const list = filter==='isogu'
    ? db.filter(r=>!r.chk_mikiroku&&!isRecordDone(r)&&r.cats.includes('技工物')&&r.chk_isogu).sort((a,b)=>(a.setdate||'').localeCompare(b.setdate||''))
    : db.filter(r=>!r.chk_mikiroku&&!isRecordDone(r)&&r.cats.includes('技工物')&&r.setdate&&targets.includes(r.setdate)).sort((a,b)=>a.setdate.localeCompare(b.setdate));
  const updReady = (id, val) => { updRec(id,{chk_ready:val}); sbFetch('records?id=eq.'+id,'PATCH',{chk_ready:val}); };
  const FILTER_BTNS = [{k:'today',label:'今日'},{k:'tomorrow',label:'明日'},{k:'after',label:'明後日'},{k:'all',label:'3日分'},{k:'isogu',label:'🚨 急ぎ'}];
  const dayLabel = d => { const diff=Math.round((new Date(d)-new Date(selDate))/(1000*60*60*24)); if(diff===0)return '今日';if(diff===1)return '明日';if(diff===2)return '明後日';return d; };
  return <div>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
      <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{fontSize:13,padding:'7px 10px',border:'1px solid var(--b2)',borderRadius:'var(--rs)',background:'var(--surface)',color:'var(--text)',outline:'none'}}/>
      <div className="fbtns" style={{margin:0}}>
        {FILTER_BTNS.map(b=><button key={b.k} className={"fb"+(filter===b.k?' on':'')} style={filter===b.k?{background:b.k==='isogu'?'var(--org)':'var(--accent)',color:'#fff',borderColor:b.k==='isogu'?'var(--org)':'var(--accent)'}:{color:b.k==='isogu'?'var(--ot)':'',borderColor:b.k==='isogu'?'#fed7aa':''}} onClick={()=>setFilter(b.k)}>{b.label}</button>)}
      </div>
    </div>
    <div style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>{list.length}件</div>
    {list.length===0
      ? <p className="empty">該当する技工物はありません</p>
      : list.map(r=>{
          const ready=r.chk_ready;
          return <div key={r.id} className="rc" style={{borderLeft:'4px solid '+(ready?'var(--green)':'var(--amber)'),opacity:ready?0.7:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div className="rn" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span>{r.patient_name}</span>
                  <StaffBadge staff={r.staff}/>
                  {r.chk_isogu&&<Bdg cls="b-org">🚨急ぎ</Bdg>}
                </div>
                <div className="rm">{r.patient_id}</div>
                <div className="rm">{r.techs.join('・')||'—'}</div>
                <div className="rm" style={{color:'var(--accent)',fontWeight:600}}>📅 {dayLabel(r.setdate)} ({r.setdate})</div>
              </div>
              <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer',padding:'6px 12px',background:ready?'var(--gbg)':'var(--s2)',border:'1px solid '+(ready?'#bbf7d0':'var(--border)'),borderRadius:'var(--rs)',color:ready?'var(--gt)':'var(--t2)',whiteSpace:'nowrap',marginLeft:8}}>
                <input type="checkbox" checked={!!ready} onChange={e=>updReady(r.id,e.target.checked)} style={{width:16,height:16,accentColor:'var(--green)',cursor:'pointer'}}/>
                {ready?'用意済':'用意'}
              </label>
            </div>
          </div>;
        })
    }
  </div>;
}

}
