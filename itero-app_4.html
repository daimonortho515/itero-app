<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="iTero管理">
<title>iTero管理</title>
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0ede8;
  --border:#e0dbd3;--border2:#ccc7be;
  --text:#1a1917;--text2:#6b6660;--text3:#9b948e;
  --accent:#2563c8;--accent-bg:#eef3fc;--accent-text:#1a4a9e;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:var(--text);font-size:14px;}

/* Layout */
#app{display:flex;flex-direction:column;height:100%;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#topbar h1{font-size:16px;font-weight:700;letter-spacing:.02em;color:var(--text);}
#topbar .sync-btn{margin-left:auto;font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;}
#topbar .sync-btn.syncing{color:var(--accent);border-color:var(--accent);}
#main-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
#main-tabs button{flex:1;min-width:72px;padding:10px 4px;font-size:12px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
#main-tabs button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sec{display:none;padding:14px;}.sec.on{display:block;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.card-ttl{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:.02em;}

/* Form elements */
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.f label{font-size:11px;color:var(--text2);font-weight:500;}
.f input,.f select,.f textarea{font-size:14px;border-radius:var(--radius-sm);border:1px solid var(--border2);padding:9px 10px;background:var(--surface2);color:var(--text);outline:none;-webkit-appearance:none;}
.f input:focus,.f select:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Chips */
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);min-height:42px;}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;}
.chip.sel{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Checkbox row */
.chk-row{display:flex;flex-wrap:wrap;gap:8px;}
.chk-item{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;}
.chk-item input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
.chk-item.done{opacity:.5;text-decoration:line-through;}

/* Buttons */
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-weight:500;border:1px solid var(--border2);background:var(--surface);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-danger{background:var(--red-bg);color:var(--red-text);border-color:#fca5a5;font-size:12px;padding:5px 10px;}
.btn-row{display:flex;gap:8px;margin-top:14px;}

/* Alerts */
.alert{padding:10px 13px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:10px;}
.alert-ok{background:var(--green-bg);color:var(--green-text);border:1px solid #bbf7d0;}
.alert-err{background:var(--red-bg);color:var(--red-text);border:1px solid #fca5a5;}

/* Subtabs */
.subtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;}
.subtab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);white-space:nowrap;font-weight:500;}
.subtab.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Record cards */
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
.rec-name{font-size:15px;font-weight:700;color:var(--text);}
.rec-meta{font-size:12px;color:var(--text2);margin-top:3px;}
.rec-chks{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.rec-chk{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;}
.rec-chk input{width:15px;height:15px;accent-color:var(--green);}
.rec-chk.done{background:var(--green-bg);border-color:#bbf7d0;color:var(--green-text);}
.rec-setdate{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--text2);}
.rec-setdate input{font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);}
.prog-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.b-ok{background:var(--green-bg);color:var(--green-text);}
.b-warn{background:var(--amber-bg);color:var(--amber-text);}
.b-gray{background:var(--surface2);color:var(--text3);}

/* Dashboard */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.metric-l{font-size:11px;color:var(--text2);margin-bottom:4px;}
.metric-v{font-size:26px;font-weight:700;color:var(--text);}

/* Search */
.search-wrap{margin-bottom:12px;}
.search-wrap input{width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;}

/* Loading */
#loading{position:fixed;inset:0;background:rgba(245,244,240,.9);display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:var(--text2);}
.empty{text-align:center;color:var(--text3);padding:2rem 0;font-size:13px;}
.auto-tag{font-size:11px;color:var(--green-text);margin-left:4px;}
</style>
</head>
<body>
<div id="loading">読み込み中...</div>
<div id="app">
  <div id="topbar">
    <h1>🦷 iTero管理</h1>
    <button class="sync-btn" id="sync-btn" onclick="syncAll()">同期</button>
  </div>
  <div id="main-tabs">
    <button class="on" onclick="sw('input',this)">新規入力</button>
    <button onclick="sw('records',this)">記録管理</button>
    <button onclick="sw('dash',this)">集計</button>
  </div>
  <div id="content">

    <!-- 新規入力 -->
    <div id="sec-input" class="sec on">
      <div class="card">
        <div class="card-ttl">患者情報</div>
        <div style="display:flex;gap:8px;align-items:flex-end;">
          <div class="f" style="width:130px;margin-bottom:0;">
            <label>患者ID</label>
            <input id="i-id" type="text" placeholder="例: 21245" oninput="autoName()">
          </div>
          <div class="f" style="flex:1;margin-bottom:0;">
            <label>患者名 <span class="auto-tag" id="auto-tag"></span></label>
            <input id="i-name" type="text" placeholder="IDで自動入力">
          </div>
        </div>
        <div class="row2" style="margin-top:10px;">
          <div class="f" style="margin-bottom:0;"><label>日付</label><input id="i-date" type="date"></div>
          <div class="f" style="margin-bottom:0;">
            <label>担当</label>
            <select id="i-staff">
              <option value="">選択</option>
              <option>鈴木</option><option>黒木</option><option>矢山</option>
              <option>荒巻</option><option>大津留</option><option>浦里</option>
              <option>受付</option><option>井ノ上</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-ttl">検査</div>
        <div class="chk-row">
          <label class="chk-item"><input type="checkbox" id="c-seimitsu"> 精密検査</label>
          <label class="chk-item"><input type="checkbox" id="c-saishuu"> 最終検査</label>
        </div>
      </div>

      <div class="card">
        <div class="card-ttl">データの種類</div>
        <div class="f">
          <label>種別（複数選択可）</label>
          <div class="chip-wrap" id="cat-chips">
            <span class="chip" onclick="toggleChip(this)">技工物</span>
            <span class="chip" onclick="toggleChip(this)">追加アライナー</span>
            <span class="chip" onclick="toggleChip(this)">再iTero</span>
            <span class="chip" onclick="toggleChip(this)">その他</span>
          </div>
        </div>
        <div class="f">
          <label>技工物内容（複数選択可）</label>
          <div class="chip-wrap" id="tech-chips">
            <span class="chip" onclick="toggleChip(this)">上顎BLR</span>
            <span class="chip" onclick="toggleChip(this)">下顎BLR</span>
            <span class="chip" onclick="toggleChip(this)">上顎クリアリテーナー</span>
            <span class="chip" onclick="toggleChip(this)">下顎クリアリテーナー</span>
            <span class="chip" onclick="toggleChip(this)">上顎Begg</span>
            <span class="chip" onclick="toggleChip(this)">下顎Begg</span>
            <span class="chip" onclick="toggleChip(this)">L/A</span>
            <span class="chip" onclick="toggleChip(this)">フック付きL/A</span>
            <span class="chip" onclick="toggleChip(this)">スプリント</span>
            <span class="chip" onclick="toggleChip(this)">バイトプレート</span>
            <span class="chip" onclick="toggleChip(this)">その他</span>
          </div>
        </div>
        <label class="chk-item" style="display:inline-flex;margin-bottom:10px;">
          <input type="checkbox" id="c-old"> 旧
        </label>
        <div class="f" style="margin-bottom:0;">
          <label>備考</label>
          <input id="i-note" type="text" placeholder="特記事項など">
        </div>
      </div>

      <div id="form-msg"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveRec()">登録する</button>
        <button class="btn" onclick="clearForm()">クリア</button>
      </div>
    </div>

    <!-- 記録管理 -->
    <div id="sec-records" class="sec">
      <div class="subtabs">
        <button class="subtab on"  onclick="swSub('技工物',this)">技工物</button>
        <button class="subtab" onclick="swSub('精密検査',this)">精密検査</button>
        <button class="subtab" onclick="swSub('最終検査',this)">最終検査</button>
        <button class="subtab" onclick="swSub('再iTero',this)">再iTero</button>
        <button class="subtab" onclick="swSub('追加アライナー',this)">追加アライナー</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="r-q" placeholder="患者名・IDで検索..." oninput="renderRec()">
      </div>
      <div id="rec-list"></div>
    </div>

    <!-- 集計 -->
    <div id="sec-dash" class="sec">
      <div class="metrics">
        <div class="metric"><div class="metric-l">総件数</div><div class="metric-v" id="d-total">0</div></div>
        <div class="metric"><div class="metric-l">今月登録</div><div class="metric-v" id="d-month">0</div></div>
        <div class="metric"><div class="metric-l">技工物</div><div class="metric-v" id="d-gikou">0</div></div>
        <div class="metric"><div class="metric-l">精密+最終検査</div><div class="metric-v" id="d-kensa">0</div></div>
      </div>
      <div class="card-ttl" style="margin-bottom:8px;">最近の登録</div>
      <div id="d-list"></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://jzrxjobwkgafwwbmcdzu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6cnhqb2J3a2dhZnd3Ym1jZHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzE0MjQsImV4cCI6MjA5MjI0NzQyNH0.dbpOuF0-6PKhR4yG6dyOREhiQgXnEJ-Ozhf4a-ia_sg';

const headers = {
  'Content-Type':'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer '+SUPABASE_KEY,
  'Prefer':'return=representation'
};

async function api(path, method='GET', body=null){
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {
    method, headers, body: body?JSON.stringify(body):null
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  return method==='DELETE'?null:res.json();
}

let DB = [];
let patients = {};
let currentSub = '技工物';

const TAB_CHECKS = {
  '技工物':        ['チェック鈴木','模型作製','到着'],
  '精密検査':      ['チェック鈴木','検査送信','orthocom','backup'],
  '最終検査':      ['チェック鈴木','検査送信','orthocom','backup'],
  '再iTero':       ['チェック鈴木'],
  '追加アライナー':['チェック鈴木'],
};
const LABEL = {
  'チェック鈴木':'チェック〔鈴木〕','模型作製':'模型作製済〔井上〕',
  '到着':'到着','検査送信':'検査送信','orthocom':'orthocom','backup':'back up'
};

function today(){ return new Date().toISOString().slice(0,10); }
function ym(){ return new Date().toISOString().slice(0,7); }

function hideLoading(){ document.getElementById('loading').style.display='none'; }

async function loadAll(){
  // 10秒でタイムアウトしても必ず画面を表示する
  const timeout = setTimeout(hideLoading, 10000);
  try {
    // 患者データは全件取得（複数回に分けて取得）
    let allPatients = [];
    let offset = 0;
    const pageSize = 1000;
    while(true){
      const pts = await api(`patients?limit=${pageSize}&offset=${offset}`);
      if(!pts||pts.length===0) break;
      allPatients = allPatients.concat(pts);
      if(pts.length < pageSize) break;
      offset += pageSize;
    }
    patients = {};
    allPatients.forEach(p=>{ patients[p.patient_id]=p.patient_name; });

    const recs = await api('records?order=created_at.desc&limit=500');
    DB = (recs||[]).map(r=>({
      ...r,
      cats: r.cats ? tryParse(r.cats) : [],
      techs: r.techs ? tryParse(r.techs) : [],
      checks:{
        精密検査: r.chk_seimitsu||false,
        最終検査: r.chk_saishuu||false,
        チェック鈴木: r.chk_suzuki||false,
        模型作製: r.chk_mokei||false,
        到着: r.chk_tochaku||false,
        検査送信: r.chk_kensashin||false,
        orthocom: r.chk_orthocom||false,
        backup: r.chk_backup||false,
      }
    }));
  } catch(e){ console.error('loadAll error:', e); }
  clearTimeout(timeout);
  hideLoading();
}

function tryParse(v){
  try{ return JSON.parse(v); }catch(e){ return []; }
}

async function syncAll(){
  const btn=document.getElementById('sync-btn');
  btn.textContent='同期中...'; btn.classList.add('syncing');
  await loadAll();
  renderRec(); renderDash();
  btn.textContent='同期'; btn.classList.remove('syncing');
}

function sw(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('#main-tabs button').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='records') renderRec();
  if(id==='dash') renderDash();
}

function swSub(sub,btn){
  currentSub=sub;
  document.querySelectorAll('.subtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderRec();
}

function toggleChip(el){ el.classList.toggle('sel'); }
function getChips(id){ return [...document.querySelectorAll('#'+id+' .chip.sel')].map(c=>c.textContent.trim()); }

async function autoName(){
  const id=document.getElementById("i-id").value.trim();
  const tag=document.getElementById("auto-tag");
  if(!id){ tag.textContent=""; return; }
  if(patients[id]){
    document.getElementById("i-name").value=patients[id];
    tag.textContent="✓ 自動入力"; return;
  }
  if(id.length>=5){
    tag.textContent="検索中...";
    try {
      const res=await api("patients?patient_id=eq."+encodeURIComponent(id)+"\&limit=1");
      if(res&&res.length>0){
        patients[id]=res[0].patient_name;
        document.getElementById("i-name").value=res[0].patient_name;
        tag.textContent="✓ 自動入力";
      } else { tag.textContent=""; }
    } catch(e){ tag.textContent=""; }
  } else { tag.textContent=""; }
}

async function saveRec(){
  const pid=document.getElementById('i-id').value.trim();
  const name=document.getElementById('i-name').value.trim();
  const msg=document.getElementById('form-msg');
  if(!pid||!name){ msg.innerHTML='<div class="alert alert-err">患者IDと患者名は必須です。</div>'; return; }
  msg.innerHTML='<div class="alert" style="background:var(--surface2);color:var(--text2);">保存中...</div>';
  try {
    const body = {
      date: document.getElementById('i-date').value||today(),
      patient_id: pid, patient_name: name,
      staff: document.getElementById('i-staff').value,
      cats: JSON.stringify(getChips('cat-chips')),
      techs: JSON.stringify(getChips('tech-chips')),
      old_flag: document.getElementById('c-old').checked,
      note: document.getElementById('i-note').value.trim(),
      setdate: null,
      chk_seimitsu: document.getElementById('c-seimitsu').checked,
      chk_saishuu: document.getElementById('c-saishuu').checked,
      chk_suzuki:false, chk_mokei:false, chk_tochaku:false,
      chk_kensashin:false, chk_orthocom:false, chk_backup:false,
    };
    await api('records','POST',body);
    if(!patients[pid]){
      await api('patients','POST',{patient_id:pid,patient_name:name});
      patients[pid]=name;
    }
    await loadAll();
    msg.innerHTML='<div class="alert alert-ok">登録しました！</div>';
    clearForm();
    setTimeout(()=>{ msg.innerHTML=''; },3000);
  } catch(e){ msg.innerHTML='<div class="alert alert-err">エラー: '+e.message+'</div>'; }
}

function clearForm(){
  ['i-id','i-name','i-note'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('i-date').value=today();
  document.getElementById('i-staff').value='';
  document.querySelectorAll('#cat-chips .chip,#tech-chips .chip').forEach(c=>c.classList.remove('sel'));
  ['c-seimitsu','c-saishuu','c-old'].forEach(x=>document.getElementById(x).checked=false);
  document.getElementById('auto-tag').textContent='';
}

function matchSub(r){
  if(currentSub==='技工物')          return (r.cats||[]).includes('技工物');
  if(currentSub==='精密検査')        return r.checks['精密検査'];
  if(currentSub==='最終検査')        return r.checks['最終検査'];
  if(currentSub==='再iTero')         return (r.cats||[]).includes('再iTero');
  if(currentSub==='追加アライナー')  return (r.cats||[]).includes('追加アライナー');
  return true;
}

function renderRec(){
  const q=(document.getElementById('r-q').value||'').toLowerCase();
  const list=DB.filter(r=>matchSub(r)&&(!q||r.patient_name.toLowerCase().includes(q)||r.patient_id.includes(q)));
  const container=document.getElementById('rec-list');
  if(!list.length){ container.innerHTML='<p class="empty">該当する記録がありません</p>'; return; }
  const keys=TAB_CHECKS[currentSub]||[];
  container.innerHTML=list.map(r=>{
    const done=keys.filter(k=>r.checks[k]).length;
    const pct=keys.length?Math.round(done/keys.length*100):100;
    const badge=pct===100&&keys.length?'<span class="badge b-ok">完了</span>':done>0?`<span class="badge b-warn">${done}/${keys.length}</span>`:'<span class="badge b-gray">未着手</span>';
    const techStr=(r.techs||[]).join('・')||'—';
    const chkHtml=keys.map(k=>`
      <label class="rec-chk${r.checks[k]?' done':''}">
        <input type="checkbox" ${r.checks[k]?'checked':''} onchange="updateChk(${r.id},'${k}',this.checked)">
        ${LABEL[k]||k}
      </label>`).join('');
    const setHtml=currentSub==='技工物'?`
      <div class="rec-setdate">
        <span>セット日:</span>
        <input type="date" value="${r.setdate||''}" onchange="updateField(${r.id},'setdate',this.value)">
      </div>`:'';
    return `<div class="rec-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="rec-name">${r.patient_name} ${r.old_flag?'<span class="badge b-warn">旧</span>':''}</div>
          <div class="rec-meta">${r.patient_id}　${r.date}　担当: ${r.staff||'—'}</div>
          <div class="rec-meta">${techStr}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          ${badge}
          <button class="btn btn-danger" onclick="delRec(${r.id})">削除</button>
        </div>
      </div>
      ${keys.length?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`:''}
      <div class="rec-chks">${chkHtml}</div>
      ${setHtml}
    </div>`;
  }).join('');
}

const COL_MAP={
  'チェック鈴木':'chk_suzuki','模型作製':'chk_mokei','到着':'chk_tochaku',
  '検査送信':'chk_kensashin','orthocom':'chk_orthocom','backup':'chk_backup',
  '精密検査':'chk_seimitsu','最終検査':'chk_saishuu'
};

async function updateChk(id,key,val){
  const r=DB.find(x=>x.id===id);
  if(r) r.checks[key]=val;
  renderRec();
  const col=COL_MAP[key];
  if(col) await api(`records?id=eq.${id}`,'PATCH',{[col]:val}).catch(console.error);
}

async function updateField(id,field,val){
  const r=DB.find(x=>x.id===id);
  if(r) r[field]=val;
  await api(`records?id=eq.${id}`,'PATCH',{[field]:val}).catch(console.error);
}

async function delRec(id){
  if(!confirm('この記録を削除しますか？')) return;
  DB=DB.filter(r=>r.id!==id);
  renderRec();
  await api(`records?id=eq.${id}`,'DELETE').catch(console.error);
}

function renderDash(){
  const m=ym();
  document.getElementById('d-total').textContent=DB.length;
  document.getElementById('d-month').textContent=DB.filter(r=>(r.date||'').startsWith(m)).length;
  document.getElementById('d-gikou').textContent=DB.filter(r=>(r.cats||[]).includes('技工物')).length;
  document.getElementById('d-kensa').textContent=DB.filter(r=>r.checks['精密検査']||r.checks['最終検査']).length;
  const recent=DB.slice(0,10);
  const dl=document.getElementById('d-list');
  if(!recent.length){ dl.innerHTML='<p class="empty">まだ記録がありません</p>'; return; }
  dl.innerHTML=recent.map(r=>{
    const cats=(r.cats||[]).join('・')||'種別未設定';
    return `<div class="rec-card">
      <div class="rec-name">${r.patient_name}</div>
      <div class="rec-meta">${r.patient_id}　${r.date}　担当: ${r.staff||'—'}</div>
      <div class="rec-meta">${cats}　${(r.techs||[]).join('・')||''}</div>
    </div>`;
  }).join('');
}

document.getElementById('i-date').value=today();
loadAll().then(()=>{ renderRec(); renderDash(); });
</script>
